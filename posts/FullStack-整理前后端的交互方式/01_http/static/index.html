<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>01 HTTP（Fetch）</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    pre { background: #111; color: #0f0; padding: 1rem; overflow: auto; border-radius: 8px; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>1. HTTP（Fetch）</h1>
  <p>打开本页需通过服务器访问（不要用 file://），例如 <code>http://127.0.0.1:8001/</code></p>
  <button type="button" id="btn">请求 /api/data</button>
  <pre id="out">（点击按钮）</pre>
  <script>
    document.getElementById("btn").onclick = () => {
      fetch("/api/data")
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("out").textContent = JSON.stringify(data, null, 2);
        })
        .catch((e) => {
          document.getElementById("out").textContent = String(e);
        });
    };
  </script>
</body>
</html>
