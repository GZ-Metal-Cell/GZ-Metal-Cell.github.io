<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>03 SSE</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    #log { background: #111; color: #0f0; padding: 1rem; min-height: 160px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>3. SSE（EventSource）</h1>
  <p>连接 <code>/stream</code>，服务器每秒推送一条，共 10 条。</p>
  <div id="log"></div>
  <script>
    const log = (s) => {
      const el = document.getElementById("log");
      el.textContent += s + "\n";
    };
    const es = new EventSource("/stream");
    es.onmessage = (e) => log("onmessage: " + e.data);
    es.onerror = () => log("onerror（流结束或断连时会触发）");
  </script>
</body>
</html>
